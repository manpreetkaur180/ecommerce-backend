version: '3.8'

services:

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"
    env_file:
      - ./user-service/.env
    depends_on:
      - user-db
      - redis
      - message-service

  message-service:
    build:
      context: ./message-service
    container_name: message-service
    ports:
      - "3002:3002"
    env_file:
      - ./message-service/.env

  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: user-redis
    ports:
      - "6379:6379"

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3003:3003"
    env_file:
      - ./notification-service/.env
    depends_on:
      - message-service
