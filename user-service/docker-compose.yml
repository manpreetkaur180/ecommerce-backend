version: '3.8'

services:
  user-service:
    build: .
    container_name: user-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - user-db

  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"